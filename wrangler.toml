# Cloudflare Worker config (this site is deployed as a Worker via Workers Builds).
# Deploy command: `npx wrangler deploy`.
# - main: the SSR entry the Astro Cloudflare adapter emits (handles /api/quiz)
# - assets: the prerendered static site; Cloudflare serves these directly and
#   only falls through to the Worker for on-demand routes
# - nodejs_compat: required by the Anthropic SDK at runtime
# `name` MUST match the Worker (hoofandclaw.cejupl.workers.dev).
name = "hoofandclaw"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-06-26"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
